<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">
        <main class="shell">

            <aside class="sidebar">
                <div class="sidebar__header">
                    <h2>Chats</h2>
                    <button class="ghost" id="newChat">+ New</button>
                </div>
                <ul id="chatList" class="chat-list"></ul>
                <button class="danger" id="deleteChats">Delete all chats</button>
            </aside>
            <div class="sidebar-overlay"></div>

            <section class="chat-panel">
                <div class="chat-panel__topbar">
                    <div class="brand">
                        <div class="logo">AI</div>
                        <div class="brand-text">
                            <p class="eyebrow desktop-only">Groq powered</p>
                            <h1 id="chatTitle">New conversation</h1>
                        </div>
                    </div>
                    <div class="topbar-controls">
                        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 12h18M3 6h18M3 18h18"/>
                            </svg>
                        </button>
                        <div class="status desktop-only">
                            <span class="dot online" id="statusDot"></span>
                            <span id="statusLabel">Ready</span>
                        </div>
                    </div>
                </div>

                <div id="messages" class="messages"></div>

                <form class="composer" id="messageForm">
                    <textarea id="userInput" name="message" rows="2" autocomplete="off" placeholder="Ask anything..."></textarea>
                    <button id="sendBtn" type="submit">Send</button>
                </form>
                <p class="hint">Press Enter to send · Shift + Enter for new line</p>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
