services:
  - type: web
    name: ai-chatbot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: PORT
        value: 3000
    healthCheckPath: /
    autoDeploy: true